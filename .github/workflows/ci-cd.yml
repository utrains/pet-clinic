name: CI/CD Pipeline - Spring PetClinic

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
  SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
  VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
  VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID }}
  VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID }}
  VAULT_JFROG_PATH: secrets/creds/jfrog
  JFROG_URL: ${{ secrets.JFROG_URL }}
  JFROG_REPO: 'devops-project'

jobs:

  # ---------------------------------------------------------------
  # 1. Checkout + Build (compile & package)
  # ---------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for SonarCloud analysis later

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Compile and package (skip tests)
        run: mvn -B clean package -DskipTests

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  # ---------------------------------------------------------------
  # 2. Unit Tests
  # ---------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: mvn -B test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore

  # ---------------------------------------------------------------
  # 3. SonarCloud Static Analysis
  # ---------------------------------------------------------------
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build, test, and analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
          -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.token=${{ env.SONAR_TOKEN }}

  # ---------------------------------------------------------------
  # 4. Trivy Vulnerability Scan (filesystem / dependencies)
  # ---------------------------------------------------------------
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: sonarcloud
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Populate Maven cache
        run: mvn -B dependency:resolve -DskipTests --no-transfer-progress

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-results.*
          if-no-files-found: ignore

  # ---------------------------------------------------------------
  # 5. Publish to JFrog Artifactory
  # ---------------------------------------------------------------
  publish:
    name: Publish to JFrog Artifactory
    runs-on: ubuntu-latest
    needs: [ sonarcloud, trivy-scan ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Authenticate to Vault and fetch JFrog credentials
        id: vault
        run: |
          VAULT_TOKEN=$(curl -s --request POST \
            --data "{\"role_id\":\"${VAULT_ROLE_ID}\",\"secret_id\":\"${VAULT_SECRET_ID}\"}" \
            "${VAULT_ADDR}/v1/auth/approle/login" | jq -r '.auth.client_token')

          if [ -z "${VAULT_TOKEN}" ] || [ "${VAULT_TOKEN}" = "null" ]; then
            echo "ERROR: Failed to authenticate to Vault — check VAULT_ROLE_ID and VAULT_SECRET_ID secrets."
            exit 1
          fi

          SECRET_JSON=$(curl -s --header "X-Vault-Token: ${VAULT_TOKEN}" \
            "${VAULT_ADDR}/v1/${VAULT_JFROG_PATH}")

          JFROG_TOKEN=$(echo "$SECRET_JSON" | jq -r '.data.data.access_token // .data.access_token')

          if [ -z "${JFROG_TOKEN}" ] || [ "${JFROG_TOKEN}" = "null" ]; then
            echo "ERROR: JFrog token is null — verify the Vault path '${VAULT_JFROG_PATH}' and key name."
            exit 1
          fi

          echo "::add-mask::${JFROG_TOKEN}"
          echo "jfrog_token=${JFROG_TOKEN}" >> "$GITHUB_OUTPUT"
        env:
          VAULT_ADDR: ${{ env.VAULT_ADDR }}
          VAULT_ROLE_ID: ${{ env.VAULT_ROLE_ID }}
          VAULT_SECRET_ID: ${{ env.VAULT_SECRET_ID }}
          VAULT_JFROG_PATH: ${{ env.VAULT_JFROG_PATH }}

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ env.JFROG_URL }}
          JF_ACCESS_TOKEN: ${{ steps.vault.outputs.jfrog_token }}

      - name: Verify JFrog connectivity
        run: jf rt ping

      - name: Configure Maven repo for JFrog deploy
        run: |
          jf mvnc \
            --repo-resolve-releases=${{ env.JFROG_REPO }} \
            --repo-resolve-snapshots=${{ env.JFROG_REPO }} \
            --repo-deploy-releases=${{ env.JFROG_REPO }} \
            --repo-deploy-snapshots=${{ env.JFROG_REPO }}

      - name: Build and deploy with JFrog CLI (collects build-info)
        env:
          JFROG_CLI_BUILD_NAME: spring-petclinic
          JFROG_CLI_BUILD_NUMBER: ${{ github.run_number }}
        run: |
          jf rt build-collect-env
          jf mvn clean deploy -DskipTests
          jf rt build-publish
