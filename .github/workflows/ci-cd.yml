      #   uses: jfrog/setup-jfrog-cli@v4
      #   env:
      #     JF_URL: ${{ env.JFROG_URL }}
      #     JF_ACCESS_TOKEN: ${{ steps.vault.outputs.jfrog_token }}

      - name: Verify JFrog connectivity
        run: jf rt ping

